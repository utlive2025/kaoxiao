<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>115全中運｜空手道對打賽程管理</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#f7f6f2;--surface:#fff;--border:#e0ddd6;--border2:#c8c4bc;--text:#1a1915;--muted:#7a776e;--accent:#2a5caa;--accent-light:#e8eef8;--green:#1a6e3c;--green-light:#e6f4ed;--gold:#b8860b;--gold-light:#fdf6e3;--red:#a0230a;--radius:6px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--text);color:#f7f6f2;padding:12px 20px;display:flex;align-items:center;gap:12px}
header h1{font-size:15px;font-weight:700;letter-spacing:1px}
.container{padding:20px;max-width:1400px;margin:0 auto}
.controls{margin-bottom:20px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
select{padding:8px 12px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface);font-family:inherit;font-size:14px;cursor:pointer}
.loading-status{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;background:#ccc}
.dot.saving{background:var(--gold);animation:blink 1s infinite}
.dot.synced{background:var(--green)}
.dot.err{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#bracket-area{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:auto;padding:40px;box-shadow:0 2px 8px rgba(0,0,0,.05);min-height:600px}
svg{display:block;margin:0 auto}
</style>
</head>
<body>
<header><h1>115 全中運｜空手道對打賽程管理 (手動模式)</h1></header>
<div class="container">
  <div class="controls">
    <select id="sheet-select"><option value="">載入中...</option></select>
    <div class="loading-status"><div id="status-dot" class="dot"></div><span id="status-text">同步中...</span></div>
  </div>
  <div id="bracket-area"></div>
</div>

<script>
// 請確認此處網址為您重新部署後產生的最新網址
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxOnqOZ7Ym7FKYmzlGTLccZhydAjMrzbO-ZG_GVKkr8N1K_Wd5ATU3bUztp4V3eHv7U/exec';
let STATE = { slots:{}, winners:{}, loserW:{}, finals:{} };
let curBK = ''; 
let saveTimer = null;

async function init(){
  setStatus('saving', '同步中...');
  try {
    const r = await fetch(GAS_URL + '?t=' + Date.now());
    const data = await r.json();
    if(data && Object.keys(data).length > 0) {
      STATE = data;
    }
    
    const categories = Object.keys(STATE.slots || {});
    const sel = document.getElementById('sheet-select');
    sel.innerHTML = ''; 
    
    if(categories.length === 0) {
      sel.innerHTML = '<option value="">無資料 (請先設定名單)</option>';
    } else {
      categories.forEach(k => {
        const opt = document.createElement('option');
        opt.value = k; opt.textContent = k.replace(/_/g, ' ');
        sel.appendChild(opt);
      });
      curBK = categories[0];
      renderAll();
    }
    
    sel.onchange = e => { curBK = e.target.value; renderAll(); };
    setStatus('synced', '已同步');
  } catch(e) {
    console.error(e);
    setStatus('err', '連線失敗，請檢查 GAS 部署');
  }
}

function setStatus(s, t){
  const d = document.getElementById('status-dot'), txt = document.getElementById('status-text');
  d.className = 'dot ' + s;
  txt.textContent = t;
}

// 點擊邏輯：點一下勝出，再點同一個人取消
function clickW4(csk, r, mi, pid) {
  if (!STATE.winners[csk]) {
    STATE.winners[csk] = [[],[],[],[]].map((_,i)=>new Array(Math.max(1, 8>>i)).fill(null));
  }
  const W = STATE.winners[csk];
  W[r][mi] = (W[r][mi] === pid) ? null : pid;
  renderAll();
  scheduleSave();
}

function scheduleSave(){
  if(saveTimer) clearTimeout(saveTimer);
  setStatus('saving', '同步中...');
  saveTimer = setTimeout(async () => {
    try {
      await fetch(GAS_URL, { method:'POST', body: JSON.stringify(STATE), mode:'no-cors' });
      setStatus('synced', '已同步');
    } catch(e) { setStatus('err', '儲存失敗'); }
  }, 1000);
}

function renderAll(){
  const area = document.getElementById('bracket-area');
  area.innerHTML = '';
  if(!curBK) return;
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', '1000');
  svg.setAttribute('height', '600');
  drawWinnerSVG(svg, curBK);
  area.appendChild(svg);
}
