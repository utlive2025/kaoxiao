<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>2026全中運核銷記錄</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
:root{--bg:#F5F4F0;--card:#fff;--border:#E2E0D8;--text:#1A1916;--muted:#7A7870;--green-bg:#E8F5E9;--green-text:#2E7D32;--green-border:#A5D6A7;--red-bg:#FFF0F0;--red-text:#C62828;--amber-bg:#FFF8E1;--amber-text:#E65100;--blue:#1A56A0;--blue-light:#E8F0FB;--blue-text:#0D3A70;--radius:12px;--radius-sm:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px}
header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 20px;position:sticky;top:0;z-index:50}
.header-inner{max-width:820px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.site-title{font-size:17px;font-weight:700}
.site-sub{font-size:12px;color:var(--muted);margin-top:2px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;display:inline-block;margin-right:8px}
.sync-dot.ok{background:#4CAF50}
.sync-dot.loading{background:var(--blue);animation:pulse 1s infinite}
.sync-dot.err{background:#E53935}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.main{max-width:820px;margin:0 auto;padding:18px 16px}
.day-tabs{display:flex;gap:6px;margin-bottom:18px;overflow-x:auto;padding-bottom:4px}
.day-tab{flex:none;padding:10px 16px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--card);font-size:14px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap;font-family:inherit}
.day-tab.active{background:var(--blue);border-color:var(--blue);color:#fff}
.stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:18px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.stat-label{font-size:11px;color:var(--muted);margin-bottom:6px}
.stat-val{font-size:22px;font-weight:700}
.section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden}
.section-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);background:#FAFAF8}
.section-title{font-size:15px;font-weight:700}
.add-btn{font-size:13px;font-weight:500;padding:7px 14px;border-radius:var(--radius-sm);border:none;background:var(--blue);color:#fff;cursor:pointer;font-family:inherit}
.stu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:8px;padding:12px}
.stu-chip{padding:12px 8px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:#FAFAF8;text-align:center}
.stu-chip.done{background:var(--green-bg);border-color:var(--green-border)}
.stu-name{font-size:14px;font-weight:500}
.stu-chip.done .stu-name{color:var(--green-text)}
.stu-info{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4}
.stu-chip.done .stu-info{color:var(--green-text);opacity:.8}
.rec-list{padding:10px 12px;display:flex;flex-direction:column;gap:6px}
.rec-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--radius-sm);background:#FAFAF8;border:1px solid var(--border);font-size:14px}
.rec-no{font-size:11px;font-weight:700;color:var(--blue);background:var(--blue-light);padding:3px 7px;border-radius:6px;flex:none}
.rec-names{flex:1;color:var(--text)}
.rec-amt{font-weight:700;flex:none}
.rec-del{font-size:12px;color:var(--red-text);cursor:pointer;padding:4px 8px;border-radius:6px;border:1px solid #FFCDD2;background:transparent;font-family:inherit;flex:none}
.rec-del:hover{background:var(--red-bg)}
.no-rec{text-align:center;color:var(--muted);font-size:13px;padding:16px}
.meal-section{border-bottom:1px solid var(--border)}
.meal-section:last-child{border-bottom:none}
.meal-head{display:flex;align-items:center;padding:12px 14px;gap:10px;background:#FAFAF8}
.meal-label{font-size:14px;font-weight:700;width:36px;flex:none}
.meal-limit{font-size:12px;color:var(--muted);flex:1}
.meal-add-btn{font-size:12px;padding:6px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-family:inherit}
.meal-add-btn:hover{background:var(--bg)}
.meal-recs{padding:0 14px 10px}
.meal-rec{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border)}
.meal-rec:last-child{border-bottom:none}
.meal-rec-name{flex:1;font-size:14px;color:var(--text)}
.meal-rec-amt{font-size:14px;font-weight:700;color:var(--text);flex:none}
.over .meal-rec-name{color:var(--red-text)}
.over .meal-rec-amt{color:var(--red-text)}
.exp-btn{font-size:13px;padding:8px 16px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-family:inherit;font-weight:500}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:var(--card);border-radius:var(--radius);width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:22px}
.modal h3{font-size:17px;font-weight:700;margin-bottom:16px}
.modal-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.modal-toolbar-label{font-size:13px;color:var(--muted)}
.modal-toolbar-btns{display:flex;gap:6px}
.sel-btn{font-size:12px;padding:4px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--blue);cursor:pointer;font-family:inherit}
.m-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:7px;margin-bottom:16px}
.m-chip{padding:12px 6px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:#FAFAF8;text-align:center;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--text);width:100%}
.m-chip.sel{background:var(--blue-light);border-color:var(--blue);color:var(--blue-text)}
.m-chip.payer{background:#1A56A0;border-color:#1A56A0;color:#fff;font-weight:700}
.m-chip.already{opacity:.35;cursor:not-allowed}
.amt-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.amt-row label{font-size:14px;color:var(--muted);flex:none}
.amt-row input{flex:1;font-size:18px;padding:10px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border);font-family:inherit;background:var(--bg);color:var(--text)}
.amt-row input:focus{outline:none;border-color:var(--blue)}
.limit-note{font-size:12px;color:var(--amber-text);background:var(--amber-bg);padding:8px 12px;border-radius:var(--radius-sm);margin-bottom:16px}
.m-actions{display:flex;gap:10px;justify-content:flex-end}
.m-cancel{font-size:15px;padding:10px 20px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-family:inherit}
.m-confirm{font-size:15px;font-weight:700;padding:10px 24px;border-radius:var(--radius-sm);border:none;background:var(--blue);color:#fff;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div>
      <div class="site-title">2026全中運核銷記錄</div>
      <div class="site-sub">4月15日 — 4月22日</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="sync-dot" id="sync-dot"></span>
      <button class="exp-btn" onclick="exportCSV()">匯出 CSV</button>
    </div>
  </div>
</header>

<div class="main">
  <div class="day-tabs" id="day-tabs"></div>
  <div class="stats">
    <div class="stat"><div class="stat-label">今日計程車費</div><div class="stat-val" id="s-taxi-amt">—</div></div>
    <div class="stat"><div class="stat-label">今日餐費總計</div><div class="stat-val" id="s-meal-amt">—</div></div>
  </div>
  <div class="section">
    <div class="section-head">
      <div class="section-title">🚕 飯店 → 會場</div>
      <button class="add-btn" id="btn-taxi-to">＋ 新增</button>
    </div>
    <div class="stu-grid" id="grid-to"></div>
    <div class="rec-list" id="recs-to"></div>
  </div>
  <div class="section">
    <div class="section-head">
      <div class="section-title">🚕 會場 → 飯店</div>
      <button class="add-btn" id="btn-taxi-from">＋ 新增</button>
    </div>
    <div class="stu-grid" id="grid-from"></div>
    <div class="rec-list" id="recs-from"></div>
  </div>
  <div class="section">
    <div class="section-head">
      <div class="section-title">🍱 餐費核銷</div>
    </div>
    <div id="meal-rows"></div>
  </div>
</div>

<div class="overlay" id="taxi-overlay">
  <div class="modal">
    <h3 id="taxi-modal-title">新增計程車費核銷</h3>
    <div class="modal-toolbar">
      <span class="modal-toolbar-label">選擇乘車學生（可多選）</span>
      <div class="modal-toolbar-btns">
        <button class="sel-btn" id="taxi-sel-all">全選</button>
        <button class="sel-btn" id="taxi-sel-clear">清除</button>
      </div>
    </div>
    <div class="m-grid" id="taxi-m-grid"></div>
    <div class="amt-row">
      <label>費用（元）</label>
      <input type="number" id="taxi-amt" placeholder="例：250" min="0" inputmode="numeric">
    </div>
    <div class="m-actions">
      <button class="m-cancel" id="taxi-cancel">取消</button>
      <button class="m-confirm" id="taxi-confirm">確認核銷</button>
    </div>
  </div>
</div>

<div class="overlay" id="meal-overlay">
  <div class="modal">
    <h3 id="meal-modal-title">新增餐費核銷</h3>
    <div class="limit-note" id="meal-limit-note"></div>
    <div class="modal-toolbar">
      <span class="modal-toolbar-label">選擇學生（可多選）</span>
      <div class="modal-toolbar-btns">
        <button class="sel-btn" id="meal-sel-all">全選</button>
        <button class="sel-btn" id="meal-sel-clear">清除</button>
      </div>
    </div>
    <div class="m-grid" id="meal-m-grid"></div>
    <div class="amt-row">
      <label>總金額（元）</label>
      <input type="number" id="meal-amt" placeholder="0" min="0" inputmode="numeric">
    </div>
    <div class="m-actions">
      <button class="m-cancel" id="meal-cancel">取消</button>
      <button class="m-confirm" id="meal-confirm">確認核銷</button>
    </div>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzk067VC0Y5BdxL2exZPcpaXLiMq84kEsT4PZxvLn4ywisY-wWWxJd4M-hoWKC-03v2/exec';
const STUDENTS = ['陳毅家','游昕喆','陳晉善','鄭旭佑','李承翰','娜姿比佑邢幸','劉雅慧','王品涵','黃宣語','陳頌雅','楊雅棉','鍾毓芝','石家馨','林育琦','李聞慈','謝擁晴','哈勇','姸卉','旻宏','俊健','屁庭','祥如','林潔','劉老'];
const DAYS = [
  {label:'4/15（二）',key:'2025-04-15'},
  {label:'4/16（三）',key:'2025-04-16'},
  {label:'4/17（四）',key:'2025-04-17'},
  {label:'4/18（五）',key:'2025-04-18'},
  {label:'4/19（六）',key:'2025-04-19'},
  {label:'4/20（日）',key:'2025-04-20'},
  {label:'4/21（一）',key:'2025-04-21'},
  {label:'4/22（二）',key:'2025-04-22'}
];
const MEALS = [
  {key:'breakfast',label:'早餐',limit:60},
  {key:'lunch',label:'午餐',limit:120},
  {key:'dinner',label:'晚餐',limit:120}
];

let allRecords = [];
let currentDay = DAYS[0].key;
let taxiSel = [];
let mealSel = [];
let currentTaxiDir = 'to';
let currentMealKey = 'breakfast';

// ---- API ----
async function callApi(params) {
  setSync('loading');
  try {
    var qs = Object.keys(params).map(function(k){ return k+'='+encodeURIComponent(params[k]); }).join('&');
    var r = await fetch(API + '?' + qs);
    var d = await r.json();
    setSync(d.ok ? 'ok' : 'err');
    return d;
  } catch(e) { setSync('err'); return null; }
}

async function fetchAll() {
  setSync('loading');
  var d = await callApi({action:'getAll'});
  if (d && d.ok) {
    allRecords = (d.records||[]).map(function(r) {
      if (r.day && String(r.day).indexOf('T') > -1) {
        var tw = new Date(new Date(r.day).getTime() + 8*60*60*1000);
        r.day = tw.toISOString().slice(0,10);
      }
      if (!r.students || r.students.length === 0) {
        r.students = r.student ? String(r.student).split('|') : [];
      } else if (r.students.length === 1 && String(r.students[0]).indexOf('|') > -1) {
        r.students = String(r.students[0]).split('|');
      }
      r.students = r.students.map(function(s){ return String(s).trim(); }).filter(function(s){ return s; });
      return r;
    });
  }
  render();
}

function setSync(s) { document.getElementById('sync-dot').className = 'sync-dot ' + s; }

// ---- Helpers ----
function dayRecs(type, sub) {
  return allRecords.filter(function(r) {
    if (r.day !== currentDay || r.type !== type) return false;
    if (sub !== undefined) return r.mealType === sub || r.mealType === (sub === 'to' ? '' : sub);
    return true;
  });
}

function taxiDoneSet(dir) {
  var done = new Set();
  allRecords.filter(function(r){ return r.day===currentDay && r.type==='taxi' && (r.mealType===dir||(dir==='to'&&r.mealType=='')); })
    .forEach(function(r){ r.students.forEach(function(s){ done.add(s); }); });
  return done;
}

function mealDoneSet(key) {
  var done = new Set();
  allRecords.filter(function(r){ return r.day===currentDay && r.type==='meal' && r.mealType===key; })
    .forEach(function(r){ r.students.forEach(function(s){ if(s) done.add(s); }); });
  return done;
}

function dayTag() { return currentDay.replace('2025-','').replace('-',''); }

// ---- Render ----
function render() {
  renderTabs();
  renderStats();
  renderTaxiSection('to');
  renderTaxiSection('from');
  renderMeals();
}

function renderTabs() {
  var el = document.getElementById('day-tabs');
  el.innerHTML = '';
  DAYS.forEach(function(d) {
    var btn = document.createElement('button');
    btn.className = 'day-tab' + (d.key===currentDay?' active':'');
    btn.textContent = d.label;
    btn.onclick = function(){ currentDay=d.key; render(); };
    el.appendChild(btn);
  });
}

function renderStats() {
  var taxiAmt = allRecords.filter(function(r){ return r.day===currentDay&&r.type==='taxi'; }).reduce(function(s,r){ return s+r.amount; },0);
  var mealAmt = allRecords.filter(function(r){ return r.day===currentDay&&r.type==='meal'; }).reduce(function(s,r){ return s+r.amount; },0);
  document.getElementById('s-taxi-amt').textContent = '$' + taxiAmt;
  document.getElementById('s-meal-amt').textContent = '$' + mealAmt;
}

function renderTaxiSection(dir) {
  var done = taxiDoneSet(dir);
  var recs = allRecords.filter(function(r){ return r.day===currentDay&&r.type==='taxi'&&(r.mealType===dir||(dir==='to'&&r.mealType==='')); });
  var prefix = dir==='to' ? 'TG' : 'TH';
  var tag = dayTag();

  // grid
  var grid = document.getElementById('grid-'+dir);
  grid.innerHTML = '';
  STUDENTS.forEach(function(name) {
    var isDone = done.has(name);
    var rec = recs.find(function(r){ return r.students.indexOf(name)>-1; });
    var companions = rec ? rec.students.filter(function(s){ return s!==name; }) : [];
    var chip = document.createElement('div');
    chip.className = 'stu-chip' + (isDone?' done':'');
    var nameEl = document.createElement('div');
    nameEl.className = 'stu-name';
    nameEl.textContent = name;
    var infoEl = document.createElement('div');
    infoEl.className = 'stu-info';
    infoEl.innerHTML = isDone ? ('$'+rec.amount+(companions.length?'<br>'+companions.join('、'):'')) : '未核銷';
    chip.appendChild(nameEl);
    chip.appendChild(infoEl);
    grid.appendChild(chip);
  });

  // records
  var recList = document.getElementById('recs-'+dir);
  recList.innerHTML = '';
  if (!recs.length) {
    var noRec = document.createElement('div');
    noRec.className = 'no-rec';
    noRec.textContent = '尚無紀錄';
    recList.appendChild(noRec);
    return;
  }
  recs.forEach(function(r, i) {
    var row = document.createElement('div');
    row.className = 'rec-item';
    var noEl = document.createElement('span');
    noEl.className = 'rec-no';
    noEl.textContent = prefix+tag+'-'+String(i+1).padStart(3,'0');
    var namesEl = document.createElement('span');
    namesEl.className = 'rec-names';
    namesEl.innerHTML = r.students.map(function(s,i){
      return i===0 ? '<span style="color:#1A56A0;font-weight:700">💳'+s+'</span>' : s;
    }).join('、');
    var amtEl = document.createElement('span');
    amtEl.className = 'rec-amt';
    amtEl.textContent = '$'+r.amount;
    var delBtn = document.createElement('button');
    delBtn.className = 'rec-del';
    delBtn.textContent = '刪除';
    delBtn.onclick = function(){ delRecord(r.id); };
    row.appendChild(noEl); row.appendChild(namesEl); row.appendChild(amtEl); row.appendChild(delBtn);
    recList.appendChild(row);
  });
}

function renderMeals() {
  var el = document.getElementById('meal-rows');
  el.innerHTML = '';
  var tag = dayTag();
  MEALS.forEach(function(m) {
    var recs = allRecords.filter(function(r){ return r.day===currentDay&&r.type==='meal'&&r.mealType===m.key; });
    var prefix = m.key==='breakfast'?'B':m.key==='lunch'?'L':'D';

    var section = document.createElement('div');
    section.className = 'meal-section';

    var head = document.createElement('div');
    head.className = 'meal-head';

    var labelEl = document.createElement('span');
    labelEl.className = 'meal-label';
    labelEl.textContent = m.label;

    var limitEl = document.createElement('span');
    limitEl.className = 'meal-limit';
    limitEl.textContent = '上限 $'+m.limit+'/人';

    var addBtn = document.createElement('button');
    addBtn.className = 'meal-add-btn';
    addBtn.textContent = '＋ 新增';
    (function(key){ addBtn.onclick = function(){ openMealModal(key); }; })(m.key);

    head.appendChild(labelEl); head.appendChild(limitEl); head.appendChild(addBtn);
    section.appendChild(head);

    var recArea = document.createElement('div');
    recArea.className = 'meal-recs';

    if (!recs.length) {
      var noRec = document.createElement('div');
      noRec.className = 'no-rec';
      noRec.style.padding = '8px 0';
      noRec.textContent = '尚無紀錄';
      recArea.appendChild(noRec);
    } else {
      recs.forEach(function(r, i) {
        var students = r.students.length ? r.students : (r.student ? String(r.student).split('|') : []);
        var perPerson = Math.ceil(r.amount / (students.length||1));
        var over = perPerson > m.limit;
        var row = document.createElement('div');
        row.className = 'meal-rec' + (over?' over':'');
        var noEl = document.createElement('span');
        noEl.className = 'rec-no';
        noEl.textContent = prefix+tag+'-'+String(i+1).padStart(3,'0');
        var nameEl = document.createElement('span');
        nameEl.className = 'meal-rec-name';
        nameEl.innerHTML = students.map(function(s,i){
          return i===0 ? '<span style="color:#1A56A0;font-weight:700">💳'+s+'</span>' : s;
        }).join('、');
        var amtEl = document.createElement('span');
        amtEl.className = 'meal-rec-amt';
        amtEl.textContent = '$'+r.amount+(students.length>1?' (每人$'+perPerson+')':'')+(over?' ⚠':'');
        var delBtn = document.createElement('button');
        delBtn.className = 'rec-del';
        delBtn.textContent = '刪除';
        (function(id){ delBtn.onclick = function(){ delRecord(id); }; })(r.id);
        row.appendChild(noEl); row.appendChild(nameEl); row.appendChild(amtEl); row.appendChild(delBtn);
        recArea.appendChild(row);
      });
    }
    section.appendChild(recArea);
    el.appendChild(section);
  });
}

// ---- Taxi Modal ----
function openTaxiModal(dir) {
  currentTaxiDir = dir;
  taxiSel = [];
  var done = taxiDoneSet(dir);
  var label = dir==='to' ? '飯店 → 會場' : '會場 → 飯店';
  document.getElementById('taxi-modal-title').textContent = '新增計程車費（'+label+'）';
  var grid = document.getElementById('taxi-m-grid');
  grid.innerHTML = '';
  STUDENTS.forEach(function(name) {
    var already = done.has(name);
    var btn = document.createElement('button');
    btn.className = 'm-chip'+(already?' already':'');
    btn.textContent = name+(already?' ✓':'');
    btn.id = 'tc-'+name;
    if (!already) { (function(n){ btn.onclick = function(){ toggleChip('tc-'+n, taxiSel, n); }; })(name); }
    grid.appendChild(btn);
  });
  document.getElementById('taxi-amt').value = '';
  document.getElementById('taxi-overlay').classList.add('open');
}

function openMealModal(key) {
  currentMealKey = key;
  mealSel = [];
  var done = mealDoneSet(key);
  var m = MEALS.find(function(x){ return x.key===key; });
  document.getElementById('meal-modal-title').textContent = m.label+'費核銷';
  document.getElementById('meal-limit-note').textContent = '每人上限 $'+m.limit+'元，超過會標紅色提醒';
  var grid = document.getElementById('meal-m-grid');
  grid.innerHTML = '';
  STUDENTS.forEach(function(name) {
    var already = done.has(name);
    var btn = document.createElement('button');
    btn.className = 'm-chip'+(already?' already':'');
    btn.textContent = name+(already?' ✓':'');
    btn.id = 'mc-'+name;
    if (!already) { (function(n){ btn.onclick = function(){ toggleChip('mc-'+n, mealSel, n); }; })(name); }
    grid.appendChild(btn);
  });
  document.getElementById('meal-amt').value = '';
  document.getElementById('meal-overlay').classList.add('open');
}

function toggleChip(id, sel, name) {
  var el = document.getElementById(id);
  if (!el) return;
  var idx = sel.indexOf(name);
  if (idx > -1) {
    sel.splice(idx, 1);
  } else {
    sel.push(name);
  }
  // 重新渲染 chips 顏色（第一個=付款人）
  refreshChipColors(sel, id.slice(0,2));
}

function refreshChipColors(sel, prefix) {
  // 先清所有 sel/payer 樣式
  document.querySelectorAll('.m-chip').forEach(function(c){
    c.classList.remove('sel','payer');
    c.querySelector && null;
  });
  sel.forEach(function(name, i) {
    var el = document.getElementById(prefix+'-'+name);
    if (!el) return;
    if (i === 0) { el.classList.add('payer'); }
    else { el.classList.add('sel'); }
  });
}

// ---- Submit ----
async function submitTaxi() {
  if (!taxiSel.length) { alert('請選擇至少一位學生'); return; }
  var amt = parseInt(document.getElementById('taxi-amt').value);
  if (!amt || amt <= 0) { alert('請輸入有效金額'); return; }
  var students = taxiSel.slice();
  var tempId = 'temp-'+Date.now();
  allRecords.push({id:tempId, day:currentDay, type:'taxi', mealType:currentTaxiDir, students:students, amount:amt});
  document.getElementById('taxi-overlay').classList.remove('open');
  render();
  var res = await callApi({action:'addTaxi', day:currentDay, students:JSON.stringify(students), amount:amt, subtype:currentTaxiDir});
  if (res && res.ok) {
    var rec = allRecords.find(function(r){ return r.id===tempId; });
    if (rec) rec.id = res.id;
  } else {
    allRecords = allRecords.filter(function(r){ return r.id!==tempId; });
    render(); alert('儲存失敗，請再試一次');
  }
}

async function submitMeal() {
  if (!mealSel.length) { alert('請選擇至少一位學生'); return; }
  var amt = parseInt(document.getElementById('meal-amt').value);
  if (!amt || amt <= 0) { alert('請輸入有效金額'); return; }
  var students = mealSel.slice();
  var tempId = 'temp-'+Date.now();
  allRecords.push({id:tempId, day:currentDay, type:'meal', mealType:currentMealKey, students:students, amount:amt});
  document.getElementById('meal-overlay').classList.remove('open');
  render();
  var res = await callApi({action:'addMeal', day:currentDay, student:students.join('|'), mealType:currentMealKey, amount:amt});
  if (res && res.ok) {
    var rec = allRecords.find(function(r){ return r.id===tempId; });
    if (rec) rec.id = res.id;
  } else {
    allRecords = allRecords.filter(function(r){ return r.id!==tempId; });
    render(); alert('儲存失敗，請再試一次');
  }
}

async function delRecord(id) {
  if (!confirm('確定刪除此筆紀錄？')) return;
  var backup = allRecords.find(function(r){ return r.id===id; });
  allRecords = allRecords.filter(function(r){ return r.id!==id; });
  render();
  var res = await callApi({action:'deleteRecord', rowId:String(id)});
  if (!res || !res.ok) {
    if (backup) allRecords.push(backup);
    render(); alert('刪除失敗：'+(res?res.error:'無回應'));
  }
}

// ---- Export ----
function exportCSV() {
  var rows = [['編號','日期','類型','方向/餐別','學生','金額']];
  DAYS.forEach(function(d) {
    var tag = d.key.replace('2025-','').replace('-','');
    var taxiTo = allRecords.filter(function(r){ return r.day===d.key&&r.type==='taxi'&&(r.mealType==='to'||r.mealType===''); });
    taxiTo.forEach(function(r,i){
      r.students.forEach(function(s){ rows.push(['TG'+tag+'-'+String(i+1).padStart(3,'0'),d.key,'計程車費','飯店→會場',s,r.amount]); });
    });
    var taxiFrom = allRecords.filter(function(r){ return r.day===d.key&&r.type==='taxi'&&r.mealType==='from'; });
    taxiFrom.forEach(function(r,i){
      r.students.forEach(function(s){ rows.push(['TH'+tag+'-'+String(i+1).padStart(3,'0'),d.key,'計程車費','會場→飯店',s,r.amount]); });
    });
    MEALS.forEach(function(m){
      var prefix = m.key==='breakfast'?'B':m.key==='lunch'?'L':'D';
      var mrecs = allRecords.filter(function(r){ return r.day===d.key&&r.type==='meal'&&r.mealType===m.key; });
      mrecs.forEach(function(r,i){
        r.students.forEach(function(s){ rows.push([prefix+tag+'-'+String(i+1).padStart(3,'0'),d.key,'餐費',m.label,s,r.amount]); });
      });
    });
  });
  var csv = rows.map(function(r){ return r.join(','); }).join('\n');
  var blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '核銷紀錄_全部.csv';
  a.click();
}

document.getElementById('meal-overlay').onclick = function(e){ if(e.target===this) this.classList.remove('open'); };

document.getElementById('taxi-sel-all').onclick = function(){

  });
  refreshChipColors(mealSel,'mc');
};

  mealSel = [];
  refreshChipColors(mealSel,'mc');
};
