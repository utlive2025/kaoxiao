<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>115全中運｜空手道對打賽程</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#f7f6f2;--surface:#fff;--border:#e0ddd6;--border2:#c8c4bc;--text:#1a1915;--muted:#7a776e;--accent:#2a5caa;--accent-light:#e8eef8;--green:#1a6e3c;--green-light:#e6f4ed;--gold:#b8860b;--gold-light:#fdf6e3;--red:#a0230a;--radius:6px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--text);color:#f7f6f2;padding:12px 20px;display:flex;align-items:center;gap:12px}
header h1{font-size:15px;font-weight:700;letter-spacing:.5px}
header p{font-size:11px;color:#aaa9a0;margin-top:2px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#888;margin-left:auto;flex-shrink:0;transition:background .3s}
.sync-dot.ok{background:#3ada7a}
.sync-dot.err{background:#e05050}
.sync-dot.syncing{background:#f0c040;animation:blink .6s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.sync-label{font-size:11px;color:#aaa9a0;margin-left:6px}
.tabs{display:flex;background:var(--text);padding:0 20px;border-bottom:2px solid #333}
.tab{padding:9px 18px;font-size:13px;font-weight:500;color:#888;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap}
.tab:hover{color:#ccc}
.tab.active{color:#f7f6f2;border-bottom-color:#f7f6f2}
.page{display:none;padding:16px 20px}
.page.active{display:block}
/* Setup */
.setup-grid{display:grid;grid-template-columns:260px 1fr;gap:16px;align-items:start}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.panel h2{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;margin-bottom:10px;text-transform:uppercase}
.div-tabs{display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap}
.div-tab{padding:4px 10px;border-radius:20px;font-size:12px;border:1px solid var(--border);background:#fafaf8;color:var(--muted);cursor:pointer;transition:all .12s}
.div-tab:hover{border-color:var(--accent);color:var(--accent)}
.div-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.ab-toggle{display:flex;gap:0;border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;margin-bottom:10px;width:fit-content}
.ab-btn{padding:5px 20px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:var(--surface);color:var(--muted);transition:all .12s;font-family:'Noto Sans TC',sans-serif}
.ab-btn.active-a{background:#2a5caa;color:#fff}
.ab-btn.active-b{background:#a0230a;color:#fff}
.ab-btn:not(.active-a):not(.active-b):hover{background:var(--bg)}
.player-list{display:flex;flex-direction:column;gap:3px;margin-top:8px;max-height:200px;overflow-y:auto}
.pchip{display:flex;align-items:center;gap:6px;padding:5px 8px;background:#fafaf8;border:1px solid var(--border);border-radius:4px;font-size:12px;cursor:grab;user-select:none;transition:background .1s}
.pchip:hover{background:var(--accent-light);border-color:var(--accent)}
.pchip.used{opacity:.4}
.pchip .pnum{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);width:30px;flex-shrink:0}
.pchip .pname{font-weight:500;min-width:40px}
.pchip .psch{font-size:10px;color:var(--muted);margin-left:auto}
.slots-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.slot-row{display:flex;align-items:center;gap:5px}
.slot-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);width:20px;text-align:right;flex-shrink:0}
.slot-box{flex:1;height:34px;border:1px dashed var(--border2);border-radius:4px;display:flex;align-items:center;padding:0 7px;font-size:11px;color:var(--muted);background:#fafaf8;cursor:pointer;transition:all .1s;position:relative;overflow:hidden;white-space:nowrap;gap:5px}
.slot-box:hover{border-color:var(--accent);background:var(--accent-light)}
.slot-box.filled{border-style:solid;border-color:var(--border2);background:var(--surface);color:var(--text)}
.slot-box.is-bye{color:var(--muted);font-style:italic;background:#f5f4f0}
.slot-box .clr{position:absolute;right:5px;font-size:13px;color:#bbb;display:none}
.slot-box:hover .clr{display:block}
.slot-box.drop-ok{border-color:var(--accent);border-style:solid;background:var(--accent-light)}
.snum{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.ssch{font-size:10px;color:var(--muted)}
.btn{padding:7px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:'Noto Sans TC',sans-serif}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#1e4a8a}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--muted)}
.btn-ghost:hover{background:var(--bg)}
.btn-danger{background:transparent;border:1px solid #ddd;color:#c0392b;font-size:12px;padding:4px 10px;border-radius:var(--radius);cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.row-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:10px;padding:18px;width:340px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal h3{font-size:14px;font-weight:700;margin-bottom:10px;flex-shrink:0}
.modal-opts{display:flex;flex-direction:column;gap:3px;overflow-y:auto;flex:1}
.mopt{padding:7px 10px;border-radius:5px;cursor:pointer;font-size:12px;display:flex;gap:8px;align-items:center;transition:background .1s}
.mopt:hover{background:var(--accent-light)}
.mopt.used{opacity:.35;pointer-events:none}
.mopt .mn{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);width:34px;flex-shrink:0}
.mopt .ms{font-size:10px;color:var(--muted);margin-left:auto}
/* Bracket page */
.class-bar{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.cbtn{padding:4px 11px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border2);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .15s}
.cbtn:hover{border-color:var(--accent);color:var(--accent)}
.cbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
/* Final box */
.final-box{background:var(--gold-light);border:2px solid #d4af37;border-radius:var(--radius);padding:10px 16px;margin-bottom:12px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.final-box .fl{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.final-players{display:flex;align-items:center;gap:10px;flex:1;min-width:200px}
.fp{flex:1;text-align:center;padding:6px;border-radius:var(--radius);transition:background .1s}
.fp.clickable{cursor:pointer}
.fp.clickable:hover{background:rgba(184,134,11,.1)}
.fp .fp-court{font-size:10px;font-weight:700;letter-spacing:.5px;margin-bottom:2px}
.fp.fpa .fp-court{color:#2a5caa}
.fp.fpb .fp-court{color:#a0230a}
.fp .fp-name{font-size:16px;font-weight:700;line-height:1.2}
.fp .fp-sch{font-size:10px;color:var(--muted)}
.fp.fp-empty .fp-name{color:#ccc;font-size:13px;font-weight:400}
.fp.fp-won .fp-name{color:var(--gold)}
.fp.fp-lost .fp-name{color:#ccc;text-decoration:line-through}
.vs-c{width:32px;height:32px;border-radius:50%;background:var(--gold);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.final-result{min-width:90px;text-align:center}
.final-result .fr-lbl{font-size:10px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.final-result .fr-name{font-size:15px;font-weight:700;color:var(--gold)}
.final-result .fr-sch{font-size:10px;color:var(--gold)}
/* Court layout */
.courts-layout{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.court-panel{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.court-panel.cp-a{border-top:3px solid #2a5caa}
.court-panel.cp-b{border-top:3px solid #a0230a}
.court-hdr{padding:8px 12px;font-size:12px;font-weight:700;letter-spacing:.5px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);background:var(--surface)}
.court-hdr.cha{color:#2a5caa}
.court-hdr.chb{color:#a0230a}
.court-now{padding:6px 12px;font-size:12px;background:#fafaf8;border-bottom:1px solid var(--border);min-height:30px;color:var(--muted)}
.court-now strong{color:var(--text)}
.bracket-area{padding:8px;overflow-x:auto}
.loser-section{margin:0 8px 8px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.loser-hdr{padding:6px 10px;font-size:11px;font-weight:700;color:var(--muted);background:#f5f4f0;border-bottom:1px solid var(--border);letter-spacing:.5px;text-transform:uppercase}
.loser-bracket-area{padding:8px;overflow-x:auto}
.bronze-box{margin:0 8px 8px;background:#f5f0e8;border:1px solid #c8a060;border-radius:var(--radius);padding:8px 12px;display:flex;align-items:center;gap:12px}
.bronze-label{font-size:10px;font-weight:700;color:#8a5a20;text-transform:uppercase;letter-spacing:.5px}
.bronze-name{font-size:14px;font-weight:700;color:#8a5a20}
.bronze-sch{font-size:10px;color:#a07040}
</style>
</head>
<body>
<header>
  <div>
    <h1>115全中運 空手道個人對打賽程</h1>
    <p>2026嘉義・即時同步版</p>
  </div>
  <div class="sync-dot" id="syncDot"></div>
  <span class="sync-label" id="syncLabel">連線中...</span>
</header>
<div class="tabs">
  <div class="tab active" onclick="showPage('setup')">設定出賽名單</div>
  <div class="tab" onclick="showPage('bracket')">對戰樹狀圖</div>
</div>

<!-- SETUP PAGE -->
<div id="page-setup" class="page active">
  <div class="setup-grid">
    <div>
      <div class="panel">
        <h2>選擇賽事</h2>
        <div class="div-tabs" id="grpTabs"></div>
        <div class="div-tabs" id="lvlTabs"></div>
        <h2 style="margin-top:10px">場地</h2>
        <div class="ab-toggle">
          <button class="ab-btn active-a" id="abBtnA" onclick="setAB('A')">A 場</button>
          <button class="ab-btn" id="abBtnB" onclick="setAB('B')">B 場</button>
        </div>
        <h2>選手名單 <span id="playerCount" style="font-weight:400;color:var(--muted)"></span></h2>
        <div class="player-list" id="playerList"></div>
      </div>
    </div>
    <div>
      <div class="panel">
        <h2 id="slotTitle">出賽位置 — A場</h2>
        <div class="slots-grid" id="slotsGrid"></div>
        <div class="row-actions">
          <button class="btn btn-primary" onclick="goToBracket()">開始比賽 →</button>
          <button class="btn btn-ghost btn-sm" onclick="autoFill()">自動填入</button>
          <button class="btn-danger" onclick="clearSlots()">清除</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- BRACKET PAGE -->
<div id="page-bracket" class="page">
  <div class="class-bar" id="classBtns"></div>
  <div class="final-box" id="finalBox"></div>
  <div class="courts-layout">
    <div class="court-panel cp-a">
      <div class="court-hdr cha">A 場地</div>
      <div class="court-now" id="nowA">—</div>
      <div class="bracket-area"><svg id="svgWA"></svg></div>
      <div class="loser-section">
        <div class="loser-hdr">敗部賽（銅牌爭奪）</div>
        <div class="loser-bracket-area"><svg id="svgLA"></svg></div>
      </div>
      <div class="bronze-box" id="bronzeA" style="display:none">
        <div><div class="bronze-label">🥉 A場銅牌</div>
        <div class="bronze-name" id="bronzeNameA"></div>
        <div class="bronze-sch" id="bronzeSchA"></div></div>
      </div>
    </div>
    <div class="court-panel cp-b">
      <div class="court-hdr chb">B 場地</div>
      <div class="court-now" id="nowB">—</div>
      <div class="bracket-area"><svg id="svgWB"></svg></div>
      <div class="loser-section">
        <div class="loser-hdr">敗部賽（銅牌爭奪）</div>
        <div class="loser-bracket-area"><svg id="svgLB"></svg></div>
      </div>
      <div class="bronze-box" id="bronzeB" style="display:none">
        <div><div class="bronze-label">🥉 B場銅牌</div>
        <div class="bronze-name" id="bronzeNameB"></div>
        <div class="bronze-sch" id="bronzeSchB"></div></div>
      </div>
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
    <button class="btn btn-ghost btn-sm" onclick="resetCourt('A')">重置A場</button>
    <button class="btn btn-ghost btn-sm" onclick="resetCourt('B')">重置B場</button>
    <button class="btn btn-ghost btn-sm" onclick="resetFinal()">重置冠亞賽</button>
    <button class="btn btn-ghost btn-sm" onclick="showPage('setup')">← 返回設定</button>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <h3 id="modalTitle">選擇選手</h3>
    <div class="modal-opts" id="modalOpts"></div>
    <button class="btn btn-ghost" style="margin-top:10px;width:100%" onclick="closeModal()">取消</button>
  </div>
</div>

const GROUPS=['高男組','高女組','國男組','國女組'];
const LEVELS=['第一量級','第二量級','第三量級','第四量級','第五量級'];

// ── State ──
let curGroup='高男組',curLevel='第一量級',curAB='A',curBK='高男組_第一量級';
// All game state stored in one object, synced to Google Sheet
let STATE = { slots:{}, winners:{}, loserW:{}, finals:{} };
let syncTimer=null, pollTimer=null, lastSaveStr='';

// ── Sync ──
function setSyncStatus(s){
  const dot=document.getElementById('syncDot'),lbl=document.getElementById('syncLabel');
  dot.className='sync-dot '+s;
  lbl.textContent=s==='ok'?'已同步':s==='syncing'?'同步中...':s==='err'?'連線失敗':'連線中...';
}

async function saveState(){
  const str=JSON.stringify(STATE);
  if(str===lastSaveStr) return;
  lastSaveStr=str;
  setSyncStatus('syncing');
  try{
    await fetch(GAS_URL,{method:'POST',body:str,mode:'no-cors'});
    setSyncStatus('ok');
  }catch(e){setSyncStatus('err');}
}

async function loadState(){
  try{
    const r=await fetch(GAS_URL+'?t='+Date.now());
    const txt=await r.text();
    if(!txt||txt==='{}') return;
    const remote=JSON.parse(txt);
    const remStr=JSON.stringify(remote);
    if(remStr===lastSaveStr) return;
    lastSaveStr=remStr;
    STATE=remote;
    renderAll();
    if(document.getElementById('page-bracket').classList.contains('active')) renderBracketPage();
    setSyncStatus('ok');
  }catch(e){setSyncStatus('err');}
}

function scheduleSave(){
  clearTimeout(syncTimer);
  syncTimer=setTimeout(saveState,800);
}

function startPolling(){
  pollTimer=setInterval(loadState,5000);
}

// ── State helpers ──
function bk(g,l){return g+'_'+l;}
function sk(g,l,ab){return g+'_'+l+'_'+ab;}

function getSlots(k){if(!STATE.slots[k])STATE.slots[k]=new Array(16).fill(null);return STATE.slots[k];}
function getW(k){
  if(!STATE.winners[k])STATE.winners[k]=[[],[],[],[]].map((_,r)=>new Array(Math.max(1,8>>r)).fill(null));
  return STATE.winners[k];
}
function getLW(k){if(!STATE.loserW[k])STATE.loserW[k]=[null,null,null];return STATE.loserW[k];}
function getFinal(bkey){return STATE.finals[bkey]!==undefined?STATE.finals[bkey]:null;}

function getPlayers(bkey){return ALL_PLAYERS[bkey]?ALL_PLAYERS[bkey].players:[];}
function getP(bkey,id){if(id===null||id===undefined||id==='bye')return null;return getPlayers(bkey)[id]||null;}

// ── Pages ──
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.tab')[name==='setup'?0:1].classList.add('active');
  if(name==='setup') renderSetup();
  if(name==='bracket') renderBracketPage();
}

// ── Setup ──
function renderSetup(){
  document.getElementById('grpTabs').innerHTML=GROUPS.map(g=>
    `<div class="div-tab ${g===curGroup?'active':''}" onclick="setGroup('${g}')">${g}</div>`).join('');
  document.getElementById('lvlTabs').innerHTML=LEVELS.map(l=>{
    const has=ALL_PLAYERS[bk(curGroup,l)]?.players.length>0;
    return has?`<div class="div-tab ${l===curLevel?'active':''}" onclick="setLevel('${l}')">${l}</div>`:'';
  }).join('');
  document.getElementById('abBtnA').className='ab-btn'+(curAB==='A'?' active-a':'');
  document.getElementById('abBtnB').className='ab-btn'+(curAB==='B'?' active-b':'');
  document.getElementById('slotTitle').innerHTML=
    `出賽位置 — <span style="color:${curAB==='A'?'#2a5caa':'#a0230a'}">${curAB} 場</span> <span style="font-weight:400;color:var(--muted);font-size:10px">點格子選人｜BYE=輪空</span>`;
  renderPlayerList();renderSlotsGrid();
}
function setGroup(g){curGroup=g;curLevel=LEVELS.find(l=>ALL_PLAYERS[bk(g,l)]?.players.length>0)||LEVELS[0];renderSetup();}
function setLevel(l){curLevel=l;renderSetup();}
function setAB(ab){curAB=ab;renderSetup();}

function renderPlayerList(){
  const bkey=bk(curGroup,curLevel),k=sk(curGroup,curLevel,curAB);
  const players=getPlayers(bkey),slots=getSlots(k);
  const used=new Set(slots.filter(s=>s!==null&&s!=='bye'));
  document.getElementById('playerCount').textContent=`（共${players.length}人）`;
  document.getElementById('playerList').innerHTML=players.map((p,i)=>
    `<div class="pchip ${used.has(i)?'used':''}" draggable="true" ondragstart="dStart(event,${i})">
      <span class="pnum">#${p.seq}</span><span class="pname">${p.name}</span><span class="psch">${p.school}</span>
    </div>`).join('');
}
function renderSlotsGrid(){
  const bkey=bk(curGroup,curLevel),k=sk(curGroup,curLevel,curAB);
  const slots=getSlots(k),players=getPlayers(bkey);
  document.getElementById('slotsGrid').innerHTML=Array.from({length:16},(_,i)=>{
    const v=slots[i],isBye=v==='bye',hasP=v!==null&&v!=='bye',p=hasP?players[v]:null;
    return `<div class="slot-row"><span class="slot-num">${i+1}</span>
      <div class="slot-box ${v!==null?'filled':''} ${isBye?'is-bye':''}"
        onclick="openModal(${i})"
        ondragover="event.preventDefault();this.classList.add('drop-ok')"
        ondragleave="this.classList.remove('drop-ok')"
        ondrop="dDrop(event,${i})">
        ${isBye?'<em>BYE</em>':hasP&&p?
          `<span class="snum">#${p.seq}</span><span style="font-weight:500">${p.name}</span><span class="ssch">${p.school}</span>`
          :'<span style="font-size:11px;opacity:.5">點選/拖曳</span>'}
        ${v!==null?`<span class="clr" onclick="clrSlot(event,${i})">×</span>`:''}
      </div></div>`;
  }).join('');
}

let dragPI=null;
function dStart(e,i){dragPI=i;}
function dDrop(e,si){e.preventDefault();e.currentTarget.classList.remove('drop-ok');if(dragPI===null)return;setSlot(si,dragPI);dragPI=null;}

let modalSlot=null;
function openModal(si){
  modalSlot=si;
  const bkey=bk(curGroup,curLevel),k=sk(curGroup,curLevel,curAB);
  const players=getPlayers(bkey),slots=getSlots(k);
  const used=new Set(slots.filter((s,ii)=>s!==null&&s!=='bye'&&ii!==si));
  document.getElementById('modalTitle').textContent=`位置 ${si+1}`;
  document.getElementById('modalOpts').innerHTML=
    `<div class="mopt" onclick="setSlotM('bye')"><span class="mn">—</span><em style="color:var(--muted)">BYE（輪空）</em></div>`+
    players.map((p,i)=>`<div class="mopt ${used.has(i)?'used':''}" onclick="setSlotM(${i})">
      <span class="mn">#${p.seq}</span><span style="font-weight:500">${p.name}</span><span class="ms">${p.school}</span></div>`).join('');
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(e){if(e&&e.target!==document.getElementById('modalOverlay'))return;document.getElementById('modalOverlay').classList.remove('open');}
function setSlotM(v){setSlot(modalSlot,v);closeModal();}
function setSlot(si,v){
  const k=sk(curGroup,curLevel,curAB);
  getSlots(k)[si]=v;
  STATE.winners[k]=null;STATE.loserW[k]=null;
  delete STATE.finals[bk(curGroup,curLevel)];
  renderSlotsGrid();renderPlayerList();scheduleSave();
}
function clrSlot(e,si){e.stopPropagation();setSlot(si,null);}
function autoFill(){
  const bkey=bk(curGroup,curLevel),k=sk(curGroup,curLevel,curAB);
  const players=getPlayers(bkey),slots=new Array(16).fill('bye');
  players.forEach((_,i)=>{if(i<16)slots[i]=i;});
  STATE.slots[k]=slots;STATE.winners[k]=null;STATE.loserW[k]=null;
  delete STATE.finals[bkey];
  renderSlotsGrid();renderPlayerList();scheduleSave();
}
function clearSlots(){
  const k=sk(curGroup,curLevel,curAB);
  STATE.slots[k]=new Array(16).fill(null);STATE.winners[k]=null;STATE.loserW[k]=null;
  renderSlotsGrid();renderPlayerList();scheduleSave();
}
function goToBracket(){
  const skA=sk(curGroup,curLevel,'A'),skB=sk(curGroup,curLevel,'B');
  if(getSlots(skA).every(s=>s===null)&&getSlots(skB).every(s=>s===null)){alert('請先設定A或B場名單');return;}
  curBK=bk(curGroup,curLevel);showPage('bracket');
}

// ── Bracket logic ──
function propagateW4(csk){
  const bkey=csk.slice(0,-2);
  const slots=getSlots(csk);
  const W=getW(csk);
  const R=[slots.slice()];
  for(let r=0;r<4;r++){
    const prev=R[r],next=[];
    for(let i=0;i<prev.length;i+=2){
      const t=prev[i],b=prev[i+1],mi=i/2;
      if(W[r][mi]===null){
        const tB=t===null||t==='bye'||!getP(bkey,t);
        const bB=b===null||b==='bye'||!getP(bkey,b);
        if(tB&&!bB)W[r][mi]=b;
        else if(bB&&!tB)W[r][mi]=t;
      }
      next.push(W[r][mi]!==null?W[r][mi]:null);
    }
    R.push(next);
  }
  return R;
}

function getChampAndLosers(csk){
  const bkey=csk.slice(0,-2);
  const R=propagateW4(csk);
  const champ=R[4]?R[4][0]:null;
  if(!champ)return{champ:null,losers:[null,null,null,null]};
  const losers=[];
  for(let r=0;r<4;r++){
    const round=R[r];
    let opp=null;
    for(let i=0;i<round.length;i++){
      if(round[i]===champ){
        const mi=Math.floor(i/2);
        const other=round[mi*2]===champ?round[mi*2+1]:round[mi*2];
        if(other!==null&&other!=='bye'&&getP(bkey,other))opp=other;
        break;
      }
    }
    losers.push(opp);
  }
  return{champ,losers};
}

function getLoserPairs(csk){
  const{losers}=getChampAndLosers(csk);
  const LW=getLW(csk);
  return[
    {top:losers[0],bot:losers[1],winner:LW[0],label:'一敗 vs 二敗'},
    {top:LW[0],bot:losers[2],winner:LW[1],label:'勝者 vs 三敗'},
    {top:LW[1],bot:losers[3],winner:LW[2],label:'銅牌賽（vs 四敗）'},
  ];
}

function curMatchesW(csk){
  const bkey=csk.slice(0,-2);
  const R=propagateW4(csk);const W=getW(csk);const cm=[];
  for(let r=0;r<4;r++){
    const round=R[r];
    for(let i=0;i<round.length;i+=2){
      const t=round[i],b=round[i+1],mi=i/2;
      if(W[r][mi]===null&&t!==null&&b!==null&&t!=='bye'&&b!=='bye'&&getP(bkey,t)&&getP(bkey,b))
        cm.push({r,mi,t,b});
    }
  }
  return cm;
}

function courtChamp(ab){
  const csk=curBK+'_'+ab;
  const R=propagateW4(csk);
  return R[4]?R[4][0]:null;
}

// ── Render all ──
function renderBracketPage(){
  const cats=[];
  GROUPS.forEach(g=>LEVELS.forEach(l=>{
    const k=bk(g,l);
    if(ALL_PLAYERS[k]?.players.length>0)cats.push({g,l,k});
  }));
  document.getElementById('classBtns').innerHTML=cats.map(c=>
    `<button class="cbtn ${c.k===curBK?'active':''}" onclick="switchBracket('${c.k}')">${c.g} ${c.l}</button>`).join('');
  renderAll();
}
function switchBracket(k){curBK=k;renderAll();}

function renderAll(){
  renderFinalBox();
  renderCourtNow('A');renderCourtNow('B');
  drawWinnerSVG('A');drawWinnerSVG('B');
  drawLoserSVG('A');drawLoserSVG('B');
  renderBronze('A');renderBronze('B');
}

function renderFinalBox(){
  const champA=courtChamp('A'),champB=courtChamp('B');
  const pA=champA!==null?getP(curBK,champA):null;
  const pB=champB!==null?getP(curBK,champB):null;
  const fin=getFinal(curBK);
  const fWinP=fin!==null?getP(curBK,fin):null;
  const mkFP=(p,ab,id)=>{
    const canClick=pA&&pB&&!fin;
    const wonClass=fin===id?'fp-won':fin&&fin!==id?'fp-lost':'';
    return p
      ?`<div class="fp fp${ab.toLowerCase()} ${wonClass} ${canClick?'clickable':''}" ${canClick?`onclick="clickFinal(${id})"`:''}>
          <div class="fp-court">${ab}場冠軍</div>
          <div class="fp-name">${p.name}</div><div class="fp-sch">${p.school}</div></div>`
      :`<div class="fp fp-empty"><div class="fp-court">${ab}場冠軍</div><div class="fp-name">（待定）</div></div>`;
  };
  document.getElementById('finalBox').innerHTML=`
    <div style="flex:1"><div class="fl">🏆 冠亞賽</div>
      <div class="final-players">${mkFP(pA,'A',champA)}<div class="vs-c">VS</div>${mkFP(pB,'B',champB)}</div>
      ${!fWinP&&pA&&pB?'<div style="font-size:11px;color:var(--muted);margin-top:4px">點選手名字決定最終冠軍</div>':''}
    </div>
    <div class="final-result">
      <div class="fr-lbl">${fWinP?'🏆 冠軍':''}</div>
      <div class="fr-name">${fWinP?fWinP.name:'—'}</div>
      <div class="fr-sch">${fWinP?fWinP.school:''}</div>
    </div>`;
}
function clickFinal(pid){if(getFinal(curBK)!==null)return;STATE.finals[curBK]=pid;renderFinalBox();scheduleSave();}
function resetFinal(){STATE.finals[curBK]=null;renderFinalBox();scheduleSave();}

function renderCourtNow(ab){
  const csk=curBK+'_'+ab;
  const cm=curMatchesW(csk);
  const champ=courtChamp(ab);
  const p=champ!==null?getP(curBK,champ):null;
  const el=document.getElementById('now'+ab);
  if(p){el.innerHTML=`<strong style="color:var(--green)">🏆 ${p.name}</strong> <span style="font-size:10px">${p.school}</span>`;}
  else if(cm.length){
    const c=cm[0];const tp=getP(curBK,c.t),bp=getP(curBK,c.b);
    const rn=['第一輪','八強','四強','決賽'][c.r];
    el.innerHTML=`<strong>${tp?tp.name:'?'}</strong> vs <strong>${bp?bp.name:'?'}</strong> <span style="font-size:10px;color:var(--muted)">${rn}</span>`;
  }else el.textContent='尚未開始';
}

function renderBronze(ab){
  const csk=curBK+'_'+ab;
  const LW=getLW(csk);
  const p=LW[2]!==null?getP(curBK,LW[2]):null;
  const box=document.getElementById('bronze'+ab);
  if(p){box.style.display='flex';document.getElementById('bronzeName'+ab).textContent=p.name;document.getElementById('bronzeSch'+ab).textContent=p.school;}
  else box.style.display='none';
}

// ── SVG drawing ──
const BW=148,BH=32,VG=3,RPAD=28;

function drawWinnerSVG(ab){
  const csk=curBK+'_'+ab;
  const bkey=curBK;
  const R=propagateW4(csk);const W=getW(csk);const cm=curMatchesW(csk);
  const ACCENT=ab==='A'?'#2a5caa':'#a0230a';
  const ROWS=16,ROUNDS=4,totalH=ROWS*(BH+VG)+38,totalW=ROUNDS*(BW+RPAD)+80;
  const svg=document.getElementById('svgW'+ab);
  svg.setAttribute('width',totalW);svg.setAttribute('height',totalH);svg.innerHTML='';
  const ns='http://www.w3.org/2000/svg';
  const el=(tag,a)=>{const e=document.createElementNS(ns,tag);Object.entries(a).forEach(([k,v])=>e.setAttribute(k,v));return e;};
  const tx=(x,y,s,a={})=>{const t=el('text',{x,y,'font-family':'Noto Sans TC,sans-serif',...a});t.textContent=s;return t;};
  const CGRAY='#e0ddd6',CGR='#1a6e3c',CGRBG='#e6f4ed';
  ['第一輪','八強','四強','決賽'].forEach((n,r)=>{
    svg.appendChild(tx(r*(BW+RPAD)+4+BW/2,14,n,{'text-anchor':'middle','font-size':'10','fill':'#7a776e','font-weight':'500'}));
  });
  for(let r=0;r<ROUNDS;r++){
    const round=R[r],n=round.length,x=r*(BW+RPAD)+4,groupSize=ROWS/n;
    for(let i=0;i<n;i++){
      const pid=round[i],p=pid!==null&&pid!=='bye'?getP(bkey,pid):null;
      const mi=Math.floor(i/2),isTop=i%2===0;
      const won=W[r]&&W[r][mi]===pid&&pid!==null&&pid!=='bye';
      const lost=W[r]&&W[r][mi]!==null&&W[r][mi]!==pid&&pid!==null&&pid!=='bye';
      const isBye=pid==='bye'||pid===null||!p;
      const isAct=cm.some(c=>c.r===r&&c.mi===mi&&(c.t===pid||c.b===pid));
      const canClick=p&&!(W[r]&&W[r][mi]!==null)&&!isBye;
      const cy=20+((i*groupSize+groupSize/2-.5)*(BH+VG));
      const ry=cy-BH/2;
      const fill=won?CGRBG:lost?'#f7f6f2':isBye?'#f5f4f0':'#fff';
      const stroke=won?CGR:isAct?ACCENT:CGRAY,sw=isAct?'1.5':'0.5';
      const rect=el('rect',{x,y:ry,width:BW,height:BH,rx:'5',fill,stroke,'stroke-width':sw});
      if(canClick){rect.style.cursor='pointer';rect.addEventListener('click',()=>clickW4(csk,r,mi,pid));}
      svg.appendChild(rect);
      if(p){
        const tf=won?CGR:lost?'#bbb':'#1a1915',op=lost?.4:1;
        svg.appendChild(tx(x+5,cy-6,`#${p.seq}`,{'font-size':'9','fill':lost?'#bbb':'#aaa','opacity':op,'font-family':'DM Mono,monospace'}));
        const nt=tx(x+5,cy+5,p.name,{'font-size':'12','fill':tf,'opacity':op,'font-weight':won?'500':'400'});
        if(canClick){nt.style.cursor='pointer';nt.addEventListener('click',()=>clickW4(csk,r,mi,pid));}
        svg.appendChild(nt);
        svg.appendChild(tx(x+5,cy+16,p.school,{'font-size':'9','fill':lost?'#ccc':'#aaa','opacity':op}));
        if(won)svg.appendChild(tx(x+BW-10,cy+4,'✓',{'font-size':'11','fill':CGR,'text-anchor':'middle'}));
      }else if(pid==='bye'){svg.appendChild(tx(x+7,cy+4,'BYE',{'font-size':'11','fill':'#bbb','font-style':'italic'}));}
      else{svg.appendChild(tx(x+7,cy+4,'—',{'font-size':'11','fill':'#ddd'}));}
      if(r<ROUNDS-1){
        svg.appendChild(el('line',{x1:x+BW,y1:cy,x2:x+BW+RPAD/2,y2:cy,stroke:CGRAY,'stroke-width':'1'}));
        if(isTop&&i+1<n){
          const cy2=20+(((i+1)*groupSize+groupSize/2-.5)*(BH+VG));
          const mx=x+BW+RPAD/2;
          svg.appendChild(el('line',{x1:mx,y1:cy,x2:mx,y2:cy2,stroke:CGRAY,'stroke-width':'1'}));
          svg.appendChild(el('line',{x1:mx,y1:(cy+cy2)/2,x2:mx+RPAD/2,y2:(cy+cy2)/2,stroke:CGRAY,'stroke-width':'1'}));
        }
      }
    }
  }
  const cx2=4*(BW+RPAD)+8;
  const fp=R[4]?getP(bkey,R[4][0]):null;
  svg.appendChild(tx(cx2,totalH/2-6,ab+'場冠軍',{'font-size':'10','fill':ACCENT,'font-weight':'700'}));
  svg.appendChild(tx(cx2,totalH/2+10,fp?fp.name:'—',{'font-size':'13','fill':fp?CGR:'#bbb','font-weight':fp?'500':'400'}));
  if(fp)svg.appendChild(tx(cx2,totalH/2+22,fp.school,{'font-size':'9','fill':CGR}));
}

function clickW4(csk,r,mi,pid){
  const W=getW(csk);if(W[r][mi]!==null)return;
  W[r][mi]=pid;renderAll();scheduleSave();
}

const LBW=140,LBH=32,LVG=2,LRPAD=24;
function drawLoserSVG(ab){
  const csk=curBK+'_'+ab;
  const bkey=curBK;
  const matches=getLoserPairs(csk);
  const ACCENT=ab==='A'?'#2a5caa':'#a0230a';
  const CGRAY='#e0ddd6',CBRONZE='#b87820',CBRONZE_BG='#f5f0e8';
  const totalW=3*(LBW+LRPAD)+30,totalH=2*(LBH+LVG)+38;
  const svg=document.getElementById('svgL'+ab);
  svg.setAttribute('width',totalW);svg.setAttribute('height',totalH);svg.innerHTML='';
  const ns='http://www.w3.org/2000/svg';
  const el=(tag,a)=>{const e=document.createElementNS(ns,tag);Object.entries(a).forEach(([k,v])=>e.setAttribute(k,v));return e;};
  const tx=(x,y,s,a={})=>{const t=el('text',{x,y,'font-family':'Noto Sans TC,sans-serif',...a});t.textContent=s;return t;};
  const matchLabels=['一敗 vs 二敗','勝者 vs 三敗','銅牌賽 vs 四敗'];
  matches.forEach((m,mi)=>{
    const x=mi*(LBW+LRPAD)+2;
    svg.appendChild(tx(x+LBW/2,13,matchLabels[mi],{'text-anchor':'middle','font-size':'10','fill':mi===2?CBRONZE:'#7a776e','font-weight':'500'}));
    [m.top,m.bot].forEach((pid,pi)=>{
      const p=pid!==null?getP(bkey,pid):null;
      const cy=18+pi*(LBH+LVG)+LBH/2;
      const ry=cy-LBH/2;
      const won=m.winner===pid&&pid!==null;
      const lost=m.winner!==null&&m.winner!==pid&&pid!==null;
      const fill=won?(mi===2?CBRONZE_BG:'#e6f4ed'):lost?'#f7f6f2':pid===null?'#f5f4f0':'#fff';
      const stroke=won?(mi===2?CBRONZE:'#1a6e3c'):pid===null?CGRAY:ACCENT.replace('#','') && (!m.winner&&m.top!==null&&m.bot!==null&&pid!==null)?ACCENT:CGRAY;
      const sw=(!m.winner&&m.top!==null&&m.bot!==null&&pid!==null)?'1.5':'0.5';
      const canClick=p&&!m.winner&&m.top!==null&&m.bot!==null;
      const rect=el('rect',{x,y:ry,width:LBW,height:LBH,rx:'5',fill,stroke,'stroke-width':sw});
      if(canClick){rect.style.cursor='pointer';rect.addEventListener('click',()=>clickLoser(csk,mi,pid));}
      svg.appendChild(rect);
      if(p){
        const tf=won?(mi===2?CBRONZE:'#1a6e3c'):lost?'#bbb':'#1a1915',op=lost?.4:1;
        const nt=tx(x+6,cy+5,p.name,{'font-size':'12','fill':tf,'opacity':op,'font-weight':won?'500':'400'});
        if(canClick){nt.style.cursor='pointer';nt.addEventListener('click',()=>clickLoser(csk,mi,pid));}
        svg.appendChild(nt);
        svg.appendChild(tx(x+6,cy+16,p.school,{'font-size':'9','fill':lost?'#ccc':'#aaa','opacity':op}));
        if(won&&mi===2)svg.appendChild(tx(x+LBW-12,cy+4,'🥉',{'font-size':'12','text-anchor':'middle'}));
        else if(won)svg.appendChild(tx(x+LBW-10,cy+4,'✓',{'font-size':'11','fill':'#1a6e3c','text-anchor':'middle'}));
      }else{
        const lbl=mi===0?(pi===0?'一敗':' 二敗'):pi===0?'上輪勝者':(mi===1?'三敗':'四敗');
        svg.appendChild(tx(x+6,cy+6,lbl,{'font-size':'11','fill':'#bbb','font-style':'italic'}));
      }
    });
    if(mi<2){
      const midY=18+(LBH+LVG)/2+LBH/2;
      svg.appendChild(el('line',{x1:x+LBW,y1:midY,x2:x+LBW+LRPAD,y2:midY,stroke:CGRAY,'stroke-width':'1'}));
    }
  });
}

function clickLoser(csk,mi,pid){
  const LW=getLW(csk);if(LW[mi]!==null)return;
  LW[mi]=pid;renderAll();scheduleSave();
}

function resetCourt(ab){
  if(!confirm(`重置${ab}場所有賽程？`))return;
  const csk=curBK+'_'+ab;
  STATE.winners[csk]=null;STATE.loserW[csk]=null;STATE.finals[curBK]=null;
  renderAll();scheduleSave();
}

// ── Init ──
renderSetup();
loadState().then(()=>{
  setSyncStatus('ok');
  startPolling();
});
</script>
